name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-optimizer:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/python-optimizer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Test
        run: pytest -q

  rust-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/rust-api
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check
        run: cargo check

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        run: npm install
      - name: Build
        run: npm run build
